<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>US Treasury Yield Curve 1990–2026</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #d0d0d0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    overflow: hidden;

    /* JS will set transform: scale() here */

    position: relative; background: #fff;
    border: 1px solid rgba(0,0,0,0.06); overflow: hidden;

  #bg-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 80px 60px;
    z-index: 1; pointer-events: none;
  }

  .header { position: absolute; top: 22px; left: 90px; z-index: 10; }
  .header-title { font-family:'Instrument Serif',serif; font-size:20px; color:rgba(0,0,0,0.72); }
  .header-sub   { font-family:'DM Mono',monospace; font-size:10px; color:rgba(0,0,0,0.32); letter-spacing:.15em; text-transform:uppercase; margin-top:3px; }

  #regime-badge { position:absolute; top:22px; right:50px; z-index:10; display:flex; align-items:center; gap:8px; }
  .regime-dot   { width:8px; height:8px; border-radius:50%; background:#aaa; flex-shrink:0; }
  .regime-text  { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:rgba(0,0,0,0.45); }

  /* ── Top chart ── */
  #top-chart-wrap {
    position: absolute; top: 64px; left: 90px; right: 50px; height: 355px; z-index: 3;
  }
  svg#top-chart { width:100%; height:100%; overflow:visible; }

  /* Big centred regime label */

    position:absolute; top:64px; left:90px; right:50px; height:355px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:2; pointer-events:none; user-select:none; text-align:center; white-space:nowrap;
  }

  #center-sub    { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:rgba(0,0,0,0.13); margin-top:8px; }

  /* ── Divider ── */
  .divider       { position:absolute; left:90px; right:50px; top:445px; height:1px; background:rgba(0,0,0,0.08); z-index:5; }
  .divider-label { position:absolute; left:90px; top:452px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:rgba(0,0,0,0.3); z-index:10; }

    position: absolute; top: 472px; left: 90px; right: 50px; height: 290px; z-index: 3;

  .axis-line { stroke:rgba(0,0,0,0.15); stroke-width:1; }

  #spread-line { fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    border:none; background:none; cursor:pointer;

  #play-btn svg { width:20px; height:20px; }

  #restart-btn {
    width:30px; height:30px; flex-shrink:0;
    border:none; background:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;

    font-family:'DM Mono',monospace; font-size:11px;

  #scrubber-track {
    width:100%; height:5px;
    background:rgba(0,0,0,0.1);
    border-radius:3px; position:relative;

  #scrubber-fill {

// RESPONSIVE SCALING
// ═══════════════════════════════════════════════
const DESIGN_W = 1280, DESIGN_H = 950;
function scaleToFit() {
  const scaler = document.getElementById('scaler');
  const scaleX = window.innerWidth  / DESIGN_W;
  const scaleY = window.innerHeight / DESIGN_H;
  const scale  = Math.min(scaleX, scaleY);
  scaler.style.transform = `scale(${scale})`;
  scaler.style.marginLeft = ((window.innerWidth  - DESIGN_W * scale) / 2) + 'px';
  scaler.style.marginTop  = ((window.innerHeight - DESIGN_H * scale) / 2) + 'px';
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

// CHART GEOMETRY — Top
// ═══════════════════════════════════════════════

const MATURITIES  = [0.25, 0.5, 1, 2, 3, 5, 7, 10, 20, 30];
const MAT_LABELS  = ['3M','6M','1Y','2Y','3Y','5Y','7Y','10Y','20Y','30Y'];
const Y_MIN = 0, Y_MAX = 10;

function txScale(m) {
  const lMin = Math.log(0.25), lMax = Math.log(30);
  return (Math.log(m) - lMin) / (lMax - lMin) * TW;
}
function tyScale(y) { return TH - (y - Y_MIN) / (Y_MAX - Y_MIN) * TH; }

const S_MIN = -250, S_MAX = 350;

function byScale(s)  { return BH - (s - S_MIN) / (S_MAX - S_MIN) * BH; }

const T_MAX = KEYFRAMES[KEYFRAMES.length-1].t;
KEYFRAMES.forEach(k => k.tn = k.t / T_MAX);

const YEAR_TICKS = [];
for (let y = 1990; y <= 2026; y += 4) YEAR_TICKS.push(y);

function lerp(a,b,t){ return a + (b-a)*t; }
function interpCurve(tn){
  let i = 0;
  while (i < KEYFRAMES.length-2 && KEYFRAMES[i+1].tn <= tn) i++;
  const k0 = KEYFRAMES[i], k1 = KEYFRAMES[i+1];
  const lc = Math.max(0, Math.min(1, (tn - k0.tn) / (k1.tn - k0.tn)));
  return {
    yields: k0.yields.map((_,j) => lerp(k0.yields[j], k1.yields[j], lc)),
    label: lc < 0.5 ? k0.label : k1.label,
    q:     lc < 0.5 ? k0.q     : k1.q,
  };
}

function drawBg() {

// ═══════════════════════════════════════════════
// PATH HELPERS
// ═══════════════════════════════════════════════
function pathD(pts) {
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i=1; i<pts.length; i++) {
    const p=pts[i-1], c=pts[i], cx=(p[0]+c[0])/2;
    d += ` C ${cx} ${p[1]}, ${cx} ${c[1]}, ${c[0]} ${c[1]}`;
  }
  return d;
}
function areaD_top(pts) {
  return pathD(pts) + ` L ${pts[pts.length-1][0]} ${TH} L ${pts[0][0]} ${TH} Z`;
}
function spreadAreaD(hist) {
  if (hist.length < 2) return '';
  const zero = byScale(0);
  let d = pathD(hist);
  return d + ` L ${hist[hist.length-1][0]} ${zero} L ${hist[0][0]} ${zero} Z`;
}

// ANIMATION STATE
// ═══════════════════════════════════════════════
const DURATION = 25000;
let startTime  = null;
let elapsed    = 0;
let paused     = false;
let rafId      = null;
let prevYields = null;

// Pre-computed spread history for ALL time steps (for seek)
// We store {tn, spread} for 500 steps
const HISTORY_STEPS = 500;
const allSpreads = [];
for (let i=0; i<=HISTORY_STEPS; i++) {
  const tn = i/HISTORY_STEPS;
  const {yields} = interpCurve(tn);
  allSpreads.push({ tn, spread: (yields[7]-yields[3])*100 });
}

function fmtTime(ms) {
  const s = Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function setPlayIcon(playing) {
  iconPause.style.display = playing ? 'block' : 'none';
  iconPlay.style.display  = playing ? 'none'  : 'block';
}

// ═══════════════════════════════════════════════
// RENDER A SINGLE FRAME at normalised time tn (0..1)
// ═══════════════════════════════════════════════
function renderAt(tn) {
  const {yields, label, q} = interpCurve(tn);
  const pts = yields.map((y,i) => [txScale(MATURITIES[i]), tyScale(y)]);

  curvePath.setAttribute('d', pathD(pts));
  areaPath.setAttribute('d',  areaD_top(pts));
  dots.forEach((d,i) => { d.setAttribute('cx', pts[i][0]); d.setAttribute('cy', pts[i][1]); });

  const spread = (yields[7] - yields[3]) * 100;
  spreadRV.textContent = (spread>=0?'+':'') + Math.round(spread) + ' bps';

  // Regime
  let regime='neutral', regLabel='—', dotColor='#aaa', textColor='rgba(0,0,0,0.45)', lineColor='#888';
  if (spread > 20 && prevYields) {
    const dS = yields[3]-prevYields[3], dL = yields[7]-prevYields[7];
    if (dS < -0.003 || dL > dS) {
      regime='bull'; regLabel='BULL STEEPENING'; dotColor='#16a34a'; textColor='#14532d'; lineColor='#16a34a';
    } else {
      regime='bear'; regLabel='BEAR STEEPENING'; dotColor='#dc2626'; textColor='#7f1d1d'; lineColor='#dc2626';
    }
  } else if (spread < -20) {
    regime='inverted'; regLabel='INVERTED'; dotColor='#ea580c'; textColor='#7c2d12'; lineColor='#ea580c';
  } else {
    regLabel='FLATTENING'; dotColor='#64748b'; textColor='rgba(0,0,0,0.4)'; lineColor='#64748b';
  }

  regimeDot.style.background   = dotColor;
  regimeDot.style.boxShadow    = `0 0 5px ${dotColor}50`;
  regimeText.textContent        = regLabel;
  regimeText.style.color        = textColor;
  centerRegime.textContent      = regLabel;
  centerRegime.style.color      = `${dotColor}18`;
  centerSub.textContent         = (spread>=0?'+':'') + Math.round(spread) + ' bps  ·  2s10s Spread  ·  ' + label + ' ' + q;
  centerSub.style.color         = `${dotColor}40`;
  spreadRV.style.color          = dotColor;

  const c = REGIME_BG[regime] || REGIME_BG.neutral;
  tgR=c.r; tgG=c.g; tgB=c.b; drawBg();

  // Spread chart — draw history up to current tn
  const histPts = allSpreads
    .filter(s => s.tn <= tn + 0.0001)
    .map(s => [bxScale(s.tn), byScale(s.spread)]);

  if (histPts.length >= 2) {
    spreadLine.setAttribute('d', pathD(histPts));
    spreadLine.setAttribute('stroke', lineColor);
    spreadArea.setAttribute('d', spreadAreaD(histPts));
    spreadArea.setAttribute('fill', lineColor);
  }

  // Dot exactly at current position
  const bx = bxScale(tn);
  const by = byScale(spread);
  spreadDot.setAttribute('cx', bx);
  spreadDot.setAttribute('cy', by);
  spreadDot.setAttribute('fill', lineColor);

  // Scrubber
  scrubFill.style.width = (tn * 100).toFixed(3) + '%';
  timeLabel.textContent = fmtTime(tn * DURATION) + ' / ' + fmtTime(DURATION);

  prevYields = [...yields];
}

// ═══════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════
function frame(ts) {
  if (paused) return;
  if (!startTime) startTime = ts - elapsed;
  elapsed = ts - startTime;
  const t  = Math.min(elapsed / DURATION, 1);
  const te = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

  renderAt(te);

  if (t < 1) {
    rafId = requestAnimationFrame(frame);
  } else {
    setPlayIcon(false);
  }
}

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════
document.getElementById('play-btn').addEventListener('click', () => {
  if (elapsed >= DURATION) {
    // Restart from beginning
    elapsed = 0; startTime = null; prevYields = null; paused = false;
    setPlayIcon(true);
    rafId = requestAnimationFrame(frame);
    return;
  }
  paused = !paused;
  setPlayIcon(!paused);
  if (!paused) {
    startTime = null; // will recalculate from elapsed
    rafId = requestAnimationFrame(frame);
  } else {
    cancelAnimationFrame(rafId);
  }
});

document.getElementById('restart-btn').addEventListener('click', () => {
  cancelAnimationFrame(rafId);
  elapsed = 0; startTime = null; prevYields = null; paused = false;
  setPlayIcon(true);
  rafId = requestAnimationFrame(frame);
});

// ── Seek via scrubber ──
function getRatio(clientX) {
  const rect = scrubTrack.getBoundingClientRect();
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function seekTo(clientX) {
  const ratio = getRatio(clientX);
  const te = ratio < 0.5 ? 2*ratio*ratio : -1+(4-2*ratio)*ratio;
  elapsed = ratio * DURATION;
  startTime = null;
  prevYields = null;
  renderAt(te);
  if (!paused) {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(frame);
  }
}

let dragging = false;
scrubWrap.addEventListener('mousedown', e => {
  e.preventDefault();
  dragging = true;
  scrubWrap.classList.add('dragging');
  seekTo(e.clientX);
});
window.addEventListener('mousemove', e => { if (dragging) seekTo(e.clientX); });
window.addEventListener('mouseup',   () => {
  if (dragging) { dragging = false; scrubWrap.classList.remove('dragging'); }
});

// Touch
scrubWrap.addEventListener('touchstart', e => {
  e.preventDefault();
  dragging = true;
  scrubWrap.classList.add('dragging');
  seekTo(e.touches[0].clientX);
}, {passive:false});
window.addEventListener('touchmove', e => {
  if (dragging) seekTo(e.touches[0].clientX);
}, {passive:true});
window.addEventListener('touchend', () => {
  if (dragging) { dragging = false; scrubWrap.classList.remove('dragging'); }
});

// ── Auto-start ──
rafId = requestAnimationFrame(frame);
</script>
</body>
