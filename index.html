<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Raab</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #181818;
    --muted: #999;
    --faint: #ccc;
    --accent: #b8966e;
    --bg: #f9f8f6;
    --line: #e9e5e0;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .card {
    text-align: center;
    max-width: 400px;
    width: 100%;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 8vw, 4.5rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1;
    white-space: nowrap;
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.1s cubic-bezier(.22,.68,0,1.2) forwards;
  }

  .location {
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #777;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.7s 0.3s ease forwards;
  }

  .divider {
    width: 28px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 3.5rem;
    opacity: 0;
    animation: fadeIn 0.6s 0.5s ease forwards;
  }

  .contacts {
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeUp 0.7s 0.65s ease forwards;
  }

  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1rem 0;
    border-bottom: 1px solid var(--line);
    gap: 2rem;
  }
  .contact-row:last-child { border-bottom: none; }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    margin: 3.5rem 0 1rem;
    opacity: 0;
    animation: fadeUp 0.7s 0.8s ease forwards;
  }

  .content-links {
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeUp 0.7s 0.9s ease forwards;
  }

  .content-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 1rem 0;
    border-bottom: 1px solid var(--line);
    gap: 2rem;
    text-decoration: none;
    color: var(--ink);
    transition: color 0.2s;
  }
  .content-row:last-child { border-bottom: none; }
  .content-row:hover { color: var(--accent); }
  .content-row:hover .content-title { color: var(--accent); }

  .content-title {
    font-size: 0.95rem;
    color: var(--ink);
    transition: color 0.2s;
    text-align: left;
  }

  .content-date {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: #aaa;
    white-space: nowrap;
    text-align: right;
  }

  .contact-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    white-space: nowrap;
  }

  .contact-value {
    font-size: 0.95rem;
    color: var(--ink);
    text-decoration: none;
    transition: color 0.2s;
    text-align: right;
  }
  a.contact-value:hover { color: var(--accent); }

  footer {
    padding: 2.5rem;
    text-align: center;
    opacity: 0;
    animation: fadeIn 0.5s 1.1s ease forwards;
  }

  .lock-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--line);
    text-decoration: none;
    transition: color 0.25s;
    padding: 0.4rem;
  }
  .lock-link:hover { color: var(--muted); }
  .lock-link svg { width: 13px; height: 13px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<main>
  <div class="card">
    <h1 class="name">Daniel Raab</h1>
    <p class="location">Köln &nbsp;·&nbsp; Deutschland</p>
    <div class="divider"></div>
    <div class="contacts">
      <div class="contact-row">
        <span class="contact-label">E-Mail</span>
        <a href="mailto:info@raab.koeln" class="contact-value">info@raab.koeln</a>
      </div>
      <div class="contact-row">
        <span class="contact-label">Web</span>
        <a href="https://raab.koeln" class="contact-value">raab.koeln</a>
      </div>
    </div>

    <p class="section-label">Markt</p>
    <div class="content-links">
      <a href="/marktcall.html" class="content-row">
        <span class="content-title">MRKT Call · Risk Reversal</span>
        <span class="content-date">14. März 2026</span>
      </a>
    </div>

  </div>
</main>

<footer>
  <a href="private.html" class="lock-link" title="Interner Bereich">

      <rect x=
