name: Daily MRKT Call Summary

on:
  schedule:
    - cron: '0 20 * * 1-4'  # Mo-Do um 21 Uhr deutscher Zeit (20 Uhr UTC)
  workflow_dispatch:          # Manuell auslösbar

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          pip install google-api-python-client youtube-transcript-api anthropic

      - name: Zusammenfassung erstellen
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_summary.py

      - name: HTML zu GitHub pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marktcall.html
          git diff --staged --quiet || git commit -m "MRKT Call Zusammenfassung $(date +'%Y-%m-%d')"
          git push
